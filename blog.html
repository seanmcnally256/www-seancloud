<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Sean McNally</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c10; color: #c8d8e8; font-family: 'Inter', sans-serif; min-height: 100vh; position: relative; }
    .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 48px; border-bottom: 1px solid rgba(0,200,150,0.12); position: relative; z-index: 10; }
    .logo { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #00c896; letter-spacing: 0.12em; display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .logo-dot { width: 5px; height: 5px; background: #00c896; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { font-size: 11px; letter-spacing: 0.08em; color: #5a7a8a; text-decoration: none; text-transform: uppercase; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: #00c896; }
    .nav-links a.active { color: #00c896; }
    main { padding: 72px 48px 64px; position: relative; z-index: 10; max-width: 700px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
    .empty-icon { width: 40px; height: 40px; margin-bottom: 20px; opacity: 0.15; }
    .empty-title { font-size: 16px; font-weight: 500; color: #3a5a6a; margin-bottom: 8px; }
    .empty-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #1e3a48; letter-spacing: 0.12em; }
    footer { padding: 18px 48px; border-top: 1px solid rgba(0,200,150,0.08); position: relative; z-index: 10; display: flex; justify-content: space-between; }
    .footer-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #1e3a48; letter-spacing: 0.06em; }
    @media (max-width: 600px) { nav { padding: 16px 20px; } main { padding: 48px 20px; } footer { padding: 16px 20px; } }
  </style>
</head>
<body>
  <div class="grid"></div>
  <nav>
    <a class="logo" href="/index.html"><div class="logo-dot"></div>seancloud.org</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Blog</a>
    </div>
  </nav>
  <main>
    <svg class="empty-icon" viewBox="0 0 40 40" fill="none" stroke="#00c896" stroke-width="1.5"><rect x="6" y="4" width="28" height="32" rx="2"/><line x1="12" y1="13" x2="28" y2="13"/><line x1="12" y1="19" x2="28" y2="19"/><line x1="12" y1="25" x2="22" y2="25"/></svg>
    <div class="empty-title">No posts yet</div>
    <div class="empty-sub">// coming soon</div>
  </main>
  <footer>
    <span class="footer-text">© 2026 Sean McNally</span>
    <span class="footer-text">seancloud.org</span>
  </footer>
</body>
</html>
