<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Sean McNally</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0c0b09;
      --amber:        #d4712a;
      --amber-border: rgba(212, 113, 42, 0.25);
      --text:         #e6e0d6;
      --text-muted:   #9a8e80;
      --text-dim:     #6a5c4e;
      --border:       rgba(212, 113, 42, 0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(ellipse 55% 45% at 0% 0%, rgba(160, 100, 20, 0.09) 0%, transparent 70%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.75;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 60px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--amber);
      letter-spacing: 0.1em;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .logo:hover { opacity: 1; }

    .nav-links { display: flex; gap: 36px; }
    .nav-links a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--amber); }

    /* ── MAIN ── */
    main { max-width: 780px; padding: 104px 60px 88px; }

    /* ── WRITING HEADER ── */
    .writing-header { margin-bottom: 64px; }

    .writing-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(40px, 6vw, 60px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 20px;
    }

    .writing-header p {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 460px;
      line-height: 1.8;
    }

    /* ── POST LIST ── */
    .post-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 0;
    }

    .post-empty {
      padding: 64px 0 40px;
    }

    .post-empty-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .post-empty-text {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-dim);
    }

    /* ── FOOTER ── */
    footer {
      padding: 20px 60px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .footer-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav   { padding: 20px 24px; }
      main  { padding: 64px 24px 64px; }
      footer { padding: 18px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/index.html">seancloud.org</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <a href="/blog.html" class="active">Writing</a>
    </div>
  </nav>

  <main>

    <section class="writing-header">
      <h1>Writing</h1>
      <p>Occasional pieces on security, systems, and whatever else demands attention.</p>
    </section>

    <div class="post-divider"></div>

    <div class="post-empty">
      <div class="post-empty-label">Posts</div>
      <div class="post-empty-text">Nothing published yet. Check back soon.</div>
    </div>

  </main>

  <footer>
    <span class="footer-text">&copy; 2026 Sean McNally</span>
    <span class="footer-text">seancloud.org</span>
  </footer>

</body>
</html>
