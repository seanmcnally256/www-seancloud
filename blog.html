<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Sean McNally</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0a;
      --red:       #e02030;
      --red-dim:   rgba(224, 32, 48, 0.07);
      --text:      #e8e3de;
      --text-muted:#62584f;
      --text-dim:  #2e2824;
      --border:    rgba(224, 32, 48, 0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(rgba(224, 32, 48, 0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.07) 3px,
        rgba(0, 0, 0, 0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .logo:hover { color: var(--text); }

    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 0.65; }
    .nav-links a.active { opacity: 1; border-bottom: 1px solid var(--red); }
    .nav-sep { color: var(--text-dim); font-size: 11px; }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 52px 48px 60px;
      position: relative;
      z-index: 10;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 10vw, 130px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .page-sub {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 48px;
    }
    .page-sub::before { content: '// '; color: var(--red); opacity: 0.6; }

    .red-rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
      opacity: 0.35;
      margin-bottom: 0;
    }

    .empty-state {
      padding: 48px 0;
      border-bottom: 1px solid var(--border);
    }

    .empty-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .empty-msg {
      font-size: 13px;
      color: var(--text-muted);
    }
    .empty-msg::before { content: '> '; color: var(--red); opacity: 0.5; }

    footer {
      padding: 14px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      position: relative;
      z-index: 10;
    }

    .footer-text {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    @media (max-width: 768px) {
      nav    { padding: 16px 24px; }
      main   { padding: 36px 24px 48px; }
      footer { padding: 14px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/index.html">seancloud.org</a>
    <div class="nav-links">
      <a href="/index.html">Home</a>
      <span class="nav-sep">|</span>
      <a href="/blog.html" class="active">Writing</a>
    </div>
  </nav>

  <main>
    <div class="page-title">Writing</div>
    <div class="page-sub">Occasional pieces on security, systems, and whatever demands attention.</div>
    <div class="red-rule"></div>
    <div class="empty-state">
      <div class="empty-label">Posts</div>
      <div class="empty-msg">Nothing published yet. Check back soon.</div>
    </div>
  </main>

  <footer>
    <span class="footer-text">© 2026 Sean McNally</span>
    <span class="footer-text">seancloud.org</span>
  </footer>

</body>
</html>
